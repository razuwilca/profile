<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>JailyzGo</title>

    <!-- Open Graph para Facebook -->
    <meta
      property="og:title"
      content="Descarga la app JailyzGo para más información"
    />
    <meta
      property="og:description"
      content="Toca aquí para descargar JailyzGo en la Play Store y ver más información."
    />
    <meta
      property="og:image"
      content="https://razuwilca.github.io/profile/assets/image/publicacion.jpeg"
    />
    <meta property="og:image:width" content="732" />
    <meta property="og:image:height" content="1600" />
    <meta
      property="og:url"
      content="https://play.google.com/store/apps/details?id=com.teofilamario.jailyzgo"
    />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script src="js/config.js"></script>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-white overflow-x-hidden"
  >
    <div class="relative flex min-h-screen w-full flex-col group/design-root">
      <div class="layout-container flex h-full grow flex-col">
        <header
          class="sticky top-0 z-50 w-full bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-solid border-[#f0f2f4] dark:border-gray-800"
        ></header>

        <!-- Main Content Area (Dynamic) -->
        <main
          id="app-content"
          class="flex flex-1 justify-center py-5 px-4 md:px-10 lg:px-40"
        >
          <!-- El contenido se cargará dinámicamente aquí -->
        </main>

        <!-- Footer -->
        <footer
          class="w-full border-t border-[#f0f2f4] dark:border-gray-800 bg-white dark:bg-background-dark py-12 mt-auto"
        >
          <div class="flex justify-center px-4 md:px-10 lg:px-40">
            <div
              class="layout-content-container flex flex-col items-center gap-6 max-w-[960px] flex-1 text-center"
            >
              <div class="flex flex-col gap-2">
                <p class="text-[#111318] dark:text-white text-lg font-bold">
                  Para más información, descarga la aplicación móvil JailyzGo.
                </p>
                <p class="text-[#111318] dark:text-white text-lg font-bold">
                  En la Play Store.
                </p>
                <p
                  class="text-[#616f89] dark:text-gray-400 text-sm font-normal leading-normal"
                >
                  © 2026. Todos los derechos reservados. Diseñado por wayradev.
                </p>
              </div>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/router.js"></script>
  </body>
</html>
